<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>パワフル・スピリッツ 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        /* UIレイアウト */
        .hud {
            position: absolute;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            pointer-events: none;
        }
        #game-info { top: 15px; left: 15px; font-size: 16px; }
        #bs-count { top: 15px; right: 15px; font-size: 20px; text-align: right; }
        #player-card { bottom: 20px; left: 15px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; border-left: 5px solid #ffeb3b; }

        /* ポップアップメッセージ */
        #msg {
            position: absolute;
            top: 35%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff; font-size: 42px; font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
            text-align: center; pointer-events: none;
        }

        /* メニュー・ガチャ画面 overlay */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 10;
        }
        .btn {
            background: linear-gradient(135deg, #ff9800, #ff5722);
            color: white; border: none; padding: 12px 30px; font-size: 18px;
            font-weight: bold; border-radius: 25px; margin: 10px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,152,0,0.4);
        }
        .btn:active { transform: scale(0.95); }
        .gacha-card {
            background: #222; border: 2px solid #ffd700; border-radius: 10px;
            padding: 20px; text-align: center; margin: 20px; width: 200px;
            box-shadow: 0 0 20px rgba(255,215,0,0.6);
        }
        .rank-S { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
        .rank-A { color: #e0e0e0; text-shadow: 0 0 10px #e0e0e0; }
        .rank-B { color: #cd7f32; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    
    <!-- 試合中UI -->
    <div id="game-info" class="hud">
        <div id="turn-display">1回表 [攻撃: P1]</div>
        <div style="font-size: 24px; margin-top: 5px;">P1: <span id="p1-score">0</span> - <span id="p2-score">0</span> :P2</div>
        <div style="color: #00e676; margin-top: 5px;">所持SP: <span id="sp-display">100</span></div>
    </div>

    <div id="bs-count" class="hud">
        <div style="color: #ff1744;">S: <span id="strikes">○○○</span></div>
        <div style="color: #00e676;">B: <span id="balls">○○○○</span></div>
        <div style="color: #ff9800;">O: <span id="outs">○○○</span></div>
    </div>

    <div id="player-card" class="hud">
        <div style="font-size:12px; color:#aaa;" id="card-role">BATTER</div>
        <div id="card-name" style="font-size:18px; color:#fff;">選手名</div>
        <div id="card-status" style="font-size:14px; color:#ffd700;">Rank</div>
    </div>

    <div id="msg">POWERFUL SPIRITS</div>

    <!-- メインメニュー -->
    <div id="menu-overlay" class="overlay">
        <h1 style="color: #ffeb3b; text-shadow: 0 0 10px rgba(255,235,59,0.6);">プロスピLite 2P対戦</h1>
        <p>1台のスマホで交互にプレイするターン制リアルタイム対戦！</p>
        <button class="btn" onclick="startMatch()">試合開始 (1イニング制)</button>
        <button class="btn" style="background:#3f51b5;" onclick="openGacha()">選手スカウト (100SP)</button>
        <div style="margin-top:20px; color:#aaa;" id="menu-sp">所持SP: 100</div>
    </div>

    <!-- ガチャ演出画面 -->
    <div id="gacha-overlay" class="overlay" style="display:none;">
        <h2 id="gacha-title">契約書開封中...</h2>
        <div id="gacha-result" style="display:none;">
            <div class="gacha-card">
                <h2 id="g-rank" class="rank-S">S</h2>
                <h3 id="g-name">大谷 翔平</h3>
                <p id="g-ability">ミート: A / 球速: 165km</p>
            </div>
            <button class="btn" onclick="closeGacha()">戻る</button>
        </div>
    </div>

    <script>
        // --- オリジナル選手データとガチャシステム ---
        const FIRST_NAMES = ["ミライ", "ツバサ", "ハヤト", "タクミ", "カイト", "リュウ", "ソウタ", "レン"];
        const LAST_NAMES = ["佐藤", "鈴木", "高橋", "田中", "伊藤", "渡辺", "山本", "中村"];
        const SKILLS = ["豪速球", "アーチスト", "安打製造機", "消える魔球", "タフネス", "全力疾走"];

        let myTeam = [
            { name: "山田 太郎", rank: "A", meet: 75, speed: 145, role: "二刀流" },
            { name: "サトシ", rank: "B", meet: 60, speed: 135, role: "二刀流" }
        ];
        let sp = 300;

        function generateRandomPlayer() {
            const rand = Math.random();
            let rank = "B", meet = 55, speed = 130;
            if (rand > 0.9) { rank = "S"; meet = 85; speed = 155; }
            else if (rand > 0.6) { rank = "A"; meet = 72; speed = 142; }
            
            meet += Math.floor(Math.random() * 15);
            speed += Math.floor(Math.random() * 12);
            const name = LAST_NAMES[Math.floor(Math.random()*LAST_NAMES.length)] + " " + FIRST_NAMES[Math.floor(Math.random()*FIRST_NAMES.length)];
            return { name, rank, meet, speed, skill: SKILLS[Math.floor(Math.random()*SKILLS.length)] };
        }

        function openGacha() {
            if (sp < 100) { alert("SPが足りません！(1回100SP)"); return; }
            sp -= 100;
            document.getElementById('menu-sp').innerText = `所持SP: ${sp}`;
            document.getElementById('sp-display').innerText = sp;
            
            document.getElementById('menu-overlay').style.display = 'none';
            document.getElementById('gacha-overlay').style.display = 'flex';
            document.getElementById('gacha-result').style.display = 'none';
            document.getElementById('gacha-title').innerText = "契約書を引いています...";

            setTimeout(() => {
                const p = generateRandomPlayer();
                myTeam.push(p);
                document.getElementById('gacha-title').innerText = "スカウト成功！";
                document.getElementById('g-rank').className = `rank-${p.rank}`;
                document.getElementById('g-rank').innerText = p.rank;
                document.getElementById('g-name').innerText = p.name;
                document.getElementById('g-ability').innerText = `ミート: ${p.meet} / 球速: ${p.speed}km\n特能: ${p.skill}`;
                document.getElementById('gacha-result').style.display = 'block';
            }, 1200);
        }

        function closeGacha() {
            document.getElementById('gacha-overlay').style.display = 'none';
            document.getElementById('menu-overlay').style.display = 'flex';
        }

        // 最強の選手を自動アサイン
        function getBestPlayers() {
            let sorted = [...myTeam].sort((a,b) => (b.rank === 'S' ? 2 : b.rank === 'A' ? 1 : 0) - (a.rank === 'S' ? 2 : a.rank === 'A' ? 1 : 0));
            return { batter: sorted[0] || {name:"モブ打者", meet:60, rank:"B"}, pitcher: sorted[1] || sorted[0] || {name:"モブ投手", speed:135, rank:"B"} };
        }

        // --- ゲーム状態管理 ---
        let gameState = 'MENU'; // MENU, PITCHING_WAIT, BALL_FLYING, INNING_CHANGE, END
        let inning = 1;         // 1 = 1回表(P1攻, P2守), 2 = 1回裏(P2攻, P1守)
        let scores = { p1: 0, p2: 0 };
        let strikes = 0, balls = 0, outs = 0;
        let activePitcher, activeBatter;

        let ballState = 'NONE';
        let ballSpeedFactor = 0.35;
        let ballVelocity = new THREE.Vector3();

        // --- Three.js 構築 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x54bbf0);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2.3, 5.5);
        camera.lookAt(0, 1.2, -10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // 光源
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const light = new THREE.DirectionalLight(0xffffff, 0.6);
        light.position.set(5, 15, 5);
        scene.add(light);

        // グラウンド簡易表現
        const groundGeo = new THREE.ConeGeometry(25, 1, 4);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x388e3c });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = Math.PI; ground.position.set(0, -0.5, -10);
        scene.add(ground);

        // ボール & バット
        const ball = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        ball.position.set(0, -10, 0);
        scene.add(ball);

        const batPivot = new THREE.Group();
        batPivot.position.set(0.6, 0.7, 1);
        scene.add(batPivot);
        const bat = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.02, 1.1, 16), new THREE.MeshStandardMaterial({ color: 0xa1887f }));
        bat.position.set(0, 0.45, 0);
        batPivot.add(bat);
        resetBat();

        function resetBat() { batPivot.rotation.set(Math.PI/6, -Math.PI/4, 0); }

        // --- ゲーム進行コアロジック ---
        function updateHud() {
            document.getElementById('p1-score').innerText = scores.p1;
            document.getElementById('p2-score').innerText = scores.p2;
            document.getElementById('strikes').innerHTML = '●'.repeat(strikes) + '○'.repeat(3 - strikes);
            document.getElementById('balls').innerHTML = '●'.repeat(balls) + '○'.repeat(4 - balls);
            document.getElementById('outs').innerHTML = '●'.repeat(outs) + '○'.repeat(3 - outs);
            document.getElementById('sp-display').innerText = sp;
        }

        function startMatch() {
            document.getElementById('menu-overlay').style.display = 'none';
            scores = { p1: 0, p2: 0 };
            inning = 1;
            outs = 0;
            setupInning();
        }

        function setupInning() {
            strikes = 0; balls = 0;
            const squad = getBestPlayers();
            
            if (inning === 1) {
                document.getElementById('turn-display').innerText = "1回表 [攻撃:P1 / 守備:P2]";
                activeBatter = { name: `P1: ${squad.batter.name}`, meet: squad.batter.meet, rank: squad.batter.rank };
                activePitcher = { name: `P2: ${squad.pitcher.name}`, speed: squad.pitcher.speed, rank: squad.pitcher.rank };
                showCenterMsg("1回表 P1の攻撃\n画面タップで投球スタート", "#fff");
            } else {
                document.getElementById('turn-display').innerText = "1回裏 [攻撃:P2 / 守備:P1]";
                activeBatter = { name: `P2: ${squad.batter.name}`, meet: squad.batter.meet, rank: squad.batter.rank };
                activePitcher = { name: `P1: ${squad.pitcher.name}`, speed: squad.pitcher.speed, rank: squad.pitcher.rank };
                showCenterMsg("1回裏 P2の攻撃\n画面タップで投球スタート", "#fff");
            }
            
            updateHud();
            updateCardDisplay();
            gameState = 'PITCHING_WAIT';
        }

        function updateCardDisplay() {
            document.getElementById('card-name').innerText = activeBatter.name;
            document.getElementById('card-status').innerText = `Rank ${activeBatter.rank} (ミート:${activeBatter.meet})`;
        }

        function showCenterMsg(txt, color) {
            const msg = document.getElementById('msg');
            msg.innerText = txt; msg.style.color = color; msg.style.display = 'block';
        }

        // 投球アクション
        function cpuOrUserPitch() {
            document.getElementById('msg').style.display = 'none';
            ball.position.set(0, 1.4, -10); // マウンドから
            
            // 投手の能力に応じて球速を可変（プロスピ風リアルスピード調整）
            const calculatedSpeed = (activePitcher.speed / 150) * ballSpeedFactor;
            
            // ちょっとした変化球ブレ
            const curveX = (Math.random() - 0.5) * 0.4;
            ballVelocity.set(curveX / 25, (0.8 - ball.position.y) / 25, calculatedSpeed);
            
            ballState = 'PITCHED';
            gameState = 'BALL_FLYING';
        }

        let isSwinging = false;
        let swingTimer = 0;

        // タップ/クリック感知時の統合ハンドラー (ターン制制御)
        function handleInteraction() {
            if (gameState === 'PITCHING_WAIT') {
                cpuOrUserPitch();
                return;
            }

            if (gameState === 'BALL_FLYING' && !isSwinging) {
                isSwinging = true;
                swingTimer = 0;

                if (ballState === 'PITCHED') {
                    const zDiff = Math.abs(ball.position.z - 1.0); // ホームベース位置
                    const hitZone = 0.12 + (activeBatter.meet / 300); // ミート値が大きいほど当たり判定が広い

                    if (zDiff < hitZone) {
                        // ヒット判定成功
                        ballState = 'HIT';
                        sp += 30; // ヒット報酬SP
                        showCenterMsg("HIT!!", "#ffeb3b");
                        
                        if (inning === 1) scores.p1++; else scores.p2++; // 簡易的に1ヒット1点計算
                        
                        ballVelocity.set((Math.random() - 0.5) * 0.6, 0.4, -0.6);
                        setTimeout(resetInningState, 2000);
                    }
                }
            }

            if (gameState === 'END') {
                document.getElementById('menu-overlay').style.display = 'flex';
                document.getElementById('menu-sp').innerText = `所持SP: ${sp}`;
                gameState = 'MENU';
            }
        }

        function resetInningState() {
            ballState = 'NONE';
            ball.position.set(0, -10, 0);
            strikes = 0; balls = 0;
            updateHud();

            if (outs >= 3) {
                if (inning === 1) {
                    inning = 2;
                    outs = 0;
                    setupInning();
                } else {
                    // 試合終了判定
                    gameState = 'END';
                    let winnerText = "DRAW (引き分け)";
                    if (scores.p1 > scores.p2) winnerText = "🏆 P1の勝利！";
                    else if (scores.p2 > scores.p1) winnerText = "🏆 P2の勝利！";
                    
                    sp += 100; // 試合完了ボーナス
                    showCenterMsg(`GAME SET!\n${winnerText}\n(タップでメニューへ)`, "#00e676");
                }
            } else {
                gameState = 'PITCHING_WAIT';
                showCenterMsg("NEXT PITCH\nタップで投球", "#fff");
            }
        }

        // アニメーションループ
        function animate() {
            requestAnimationFrame(animate);

            if (isSwinging) {
                swingTimer += 0.2;
                batPivot.rotation.y = -Math.PI / 4 + Math.sin(swingTimer) * Math.PI;
                if (swingTimer >= Math.PI) {
                    isSwinging = false;
                    resetBat();
                }
            }

            if (ballState === 'PITCHED') {
                ball.position.add(ballVelocity);
                if (ball.position.z > 2.2) { // キャッチャー通過
                    ballState = 'MISSED';
                    strikes++;
                    showCenterMsg("STRIKE", "#ff1744");
                    
                    if (strikes >= 3) {
                        outs++;
                        showCenterMsg("OUT!", "#ff1744");
                    }
                    setTimeout(resetInningState, 1200);
                }
            } else if (ballState === 'HIT') {
                ballVelocity.y -= 0.015; // 重力
                ball.position.add(ballVelocity);
            }

            renderer.render(scene, camera);
        }

        // 操作用リスナー
        window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInteraction(); }, { passive: false });
        window.addEventListener('mousedown', (e) => { if ('ontouchstart' in window) return; handleInteraction(); });
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
