<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Prospi Mini Clone</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background: #111;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        /* ゲーム画面全体（プロスピ風の縦画面） */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: linear-gradient(to bottom, #4a90e2 0%, #63b3ed 40%, #2f855a 40%, #22543d 100%);
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        /* スタジアムの奥行き感（3D風） */
        .stadium-3d {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translateX(-50%) perspective(200px) rotateX(60deg);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #276749 30%, #1c4d34 100%);
            border: 4px solid #fff;
        }
        /* ピッチャーマウンド */
        #mound {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 15px;
            background: #9c4221;
            border-radius: 50%;
        }
        /* バッターボックス（ストライクゾーンの目安） */
        #strike-zone {
            position: absolute;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 150px;
            border: 2px dashed rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* ボール */
        #ball {
            position: absolute;
            top: 45%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.4), 0 2px 5px rgba(0,0,0,0.3);
            transform: translate(-50%, -50%);
            display: none;
            z-index: 10;
        }
        /* スイングエフェクト（バット） */
        #bat-swing {
            position: absolute;
            bottom: 22%;
            left: 10%;
            width: 80%;
            height: 20px;
            background: linear-gradient(90deg, transparent, #ecc94b, #fff, transparent);
            transform: scaleX(0);
            transform-origin: left center;
            z-index: 15;
            opacity: 0;
        }
        /* UIテキスト */
        .ui-text {
            position: absolute;
            width: 100%;
            text-align: center;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-weight: bold;
            pointer-events: none;
        }
        #hud { top: 5%; font-size: 1.2rem; display: flex; justify-content: space-around; }
        #result-msg { top: 50%; transform: translateY(-50%); font-size: 3rem; font-style: italic; display: none; z-index: 20; }
        #instruction { bottom: 10%; font-size: 1rem; color: #ecc94b; animation: blink 1.5s infinite; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stadium-3d"></div>
    <div id="mound"></div>
    <div id="strike-zone"></div>
    <div id="ball"></div>
    <div id="bat-swing"></div>
    
    <div id="hud">
        <div>SCORE: <span id="score">0</span></div>
        <div>SPEED: <span id="speed">---</span> km/h</div>
    </div>
    <div id="result-msg">HIT!!</div>
    <div id="instruction">画面をタップしてスイング！</div>
</div>

<script>
    // 要素の取得
    const container = document.getElementById('game-container');
    const ball = document.getElementById('ball');
    const batSwing = document.getElementById('bat-swing');
    const resultMsg = document.getElementById('result-msg');
    const scoreEl = document.getElementById('score');
    const speedEl = document.getElementById('speed');

    // ゲームの状態管理（タップ不具合対策のキモ）
    let gameState = 'WAITING'; // WAITING, PITCHING, RESULT
    let score = 0;
    
    // ボールの物理パラメータ
    let ballY = 45; // 画面上のトップからの%
    let ballScale = 1.0;
    let ballSpeed = 1.2; // 1フレームあたりの移動量
    let currentKm/h = 0;
    let animationFrameId = null;

    // 1. タップ・クリックイベントの一元化（不具合対策）
    // pointerdownはマウス、指、ペンすべてを最速で検知し、重複を抑えます
    container.addEventListener('pointerdown', (e) => {
        e.preventDefault(); // ブラウザ特有のダブルタップズームなどを防止
        
        if (gameState === 'WAITING') {
            startPitch();
        } else if (gameState === 'PITCHING') {
            swingBat();
        }
    });

    // 2. 投球開始
    function startPitch() {
        gameState = 'PITCHING';
        resultMsg.style.display = 'none';
        
        // プロスピ風ランダム球速
        currentKm/h = Math.floor(Math.random() * (165 - 135 + 1)) + 135;
        ballSpeed = (currentKm/h / 140) * 1.2; // 球速に応じてリアルに変化
        
        // ボール初期化
        ballY = 45;
        ballScale = 0.5;
        ball.style.display = 'block';
        updateBallPosition();
        
        // 描画ループ開始
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        animationFrameId = requestAnimationFrame(updatePhysics);
    }

    // 3. ボールの移動ループ（requestAnimationFrameで超滑らか）
    function updatePhysics() {
        if (gameState !== 'PITCHING') return;

        ballY += ballSpeed;
        // 手前に来るほどボールを大きくして3D感を演出（超ハイクオリティ化のコツ）
        ballScale += ballSpeed * 0.08; 

        updateBallPosition();

        // セーフティ機能：タップされずにキャッチャーを通り過ぎたら自動でストライク判定してリセット
        // これにより「タップしても何も起きずにフリーズする」のを完全に防ぎます
        if (ballY > 85) {
            endTurn('MISS...');
        } else {
            animationFrameId = requestAnimationFrame(updatePhysics);
        }
    }

    function updateBallPosition() {
        ball.style.top = `${ballY}%`;
        ball.style.transform = `translate(-50%, -50%) scale(${ballScale})`;
    }

    // 4. スイングと判定処理
    function swingBat() {
        // スイングアニメーションのトリガー
        batSwing.style.opacity = '1';
        batSwing.style.transform = 'scaleX(1)';
        batSwing.style.transition = 'transform 0.1s ease-out';

        // 判定ゾーン（ボールのY座標が 72% 〜 78% の間がジャストミート）
        // プロスピのようなシビアなタイミング
        if (ballY >= 72 && ballY <= 78) {
            score += 1;
            scoreEl.textContent = score;
            speedEl.textContent = currentKm/h;
            endTurn('HOMERUN!!', '#ecc94b');
        } else if (ballY >= 67 && ballY <= 82) {
            score += 1;
            scoreEl.textContent = score;
            speedEl.textContent = currentKm/h;
            endTurn('HIT!', '#48bb78');
        } else {
            endTurn('SWING & MISS', '#e53e3e');
        }

        // バットを戻す
        setTimeout(() => {
            batSwing.style.opacity = '0';
            batSwing.style.transform = 'scaleX(0)';
            batSwing.style.transition = 'none';
        }, 150);
    }

    // 5. 1球ごとの終了処理（安全に次の球へバトンタッチ）
    function endTurn(message, color = '#fff') {
        gameState = 'RESULT';
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        
        ball.style.display = 'none';
        
        // 結果表示
        resultMsg.innerText = message;
        resultMsg.style.color = color;
        resultMsg.style.display = 'block';

        // 1.5秒後に自動的に次の投球を待つ状態に戻す（完全に硬直を防ぐ仕組み）
        setTimeout(() => {
            gameState = 'WAITING';
        }, 1200);
    }
</script>

</body>
</html>
